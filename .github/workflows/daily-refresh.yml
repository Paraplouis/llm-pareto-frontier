name: Deploy Pages on data changes
run-name: ${{ github.actor }} updated data 📦→🌐
on:
  push:
    branches:
      - main
    paths:
      - 'data/**'
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare web assets
        run: |
          mkdir _site
          cp index.html styles.css screenshot.png _site/ 2>/dev/null || true
          cp -r js _site/
          mkdir -p _site/data
          cp data/synthesized_data.js data/price_data.json _site/data/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
